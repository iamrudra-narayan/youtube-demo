<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="description" content="YouTube Video Player - Search and watch videos">
    <title>YouTube Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <i class="fab fa-youtube"></i>
            <span>YouTube</span>
        </div>
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search videos...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="search-type">
                <button class="type-btn active" data-type="video">
                    <i class="fas fa-video"></i> Videos
                </button>
                <button class="type-btn" data-type="playlist">
                    <i class="fas fa-list"></i> Playlists
                </button>
            </div>
        </div>
        <div class="header-info">
            {% if api_key %}
                <span class="api-status connected"><i class="fas fa-check-circle"></i> API Connected</span>
            {% else %}
                <span class="api-status missing"><i class="fas fa-exclamation-triangle"></i> Set YOUTUBE_API_KEY</span>
            {% endif %}
        </div>
    </header>

    <main class="main-content">
        <aside class="playlist-queue" id="playlist-queue">
            <div class="queue-header">
                <h3>Queue</h3>
                <button id="clear-queue" class="clear-btn"><i class="fas fa-trash"></i></button>
            </div>
            <div class="queue-list" id="queue-list">
                <p class="queue-empty">No videos in queue</p>
            </div>
        </aside>

        <section class="player-section">
            <div class="video-container" id="video-container">
                <div class="player-wrapper" id="player-wrapper">
                    <iframe id="player-iframe" src="" type="text/html" frameborder="0" allowfullscreen></iframe>
                    <div id="player" style="display:none;"></div>
                    <div class="thumbnail-preview" id="thumbnail-preview">
                        <img src="" alt="Thumbnail">
                    </div>
                </div>

                <div class="player-controls" id="player-controls">
                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar" id="progress-bar">
                            <div class="progress-played" id="progress-played"></div>
                        </div>
                        <div class="time-display">
                            <span id="current-time">0:00</span>
                            <span class="time-separator">/</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>

                    <div class="controls-row">
                        <div class="controls-left">
                            <button class="control-btn" id="prev-btn" title="Previous">
                                <i class="fas fa-step-backward"></i>
                            </button>
                            <button class="control-btn play-btn" id="play-pause-btn" title="Play">
                                <i class="fas fa-play"></i>
                            </button>
                            <button class="control-btn" id="next-btn" title="Next">
                                <i class="fas fa-step-forward"></i>
                            </button>
                        </div>

                        <div class="controls-center">
                            <span class="now-playing" id="now-playing"></span>
                        </div>

                        <div class="controls-right">
                            <div class="volume-control">
                                <button class="control-btn" id="volume-btn">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <input type="range" id="volume-slider" min="0" max="100" value="100">
                            </div>
                            <button class="control-btn" id="fullscreen-btn" title="Fullscreen">
                                <i class="fas fa-expand"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="loader" id="loader">
                    <div class="spinner"></div>
                </div>

                <div class="double-click-hint" id="double-click-hint">
                    <span class="hint-left"><i class="fas fa-backward"></i> 5s</span>
                    <span class="hint-right"><i class="fas fa-forward"></i> 5s</span>
                </div>
            </div>

            <div class="video-info" id="video-info">
                <h2 id="video-title">Select a video to play</h2>
                <p id="video-channel"></p>
            </div>
        </section>

        <aside class="search-results">
            <div class="results-header">
                <h3>Search Results</h3>
                <span id="results-count"></span>
            </div>
            <div class="results-grid" id="results-grid">
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <p>Search for videos or playlists</p>
                </div>
            </div>
            <div class="loading-spinner" id="loading-spinner">
                <div class="spinner"></div>
            </div>
        </aside>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
